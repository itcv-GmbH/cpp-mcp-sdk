name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.target }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        include:
          - target: linux-x86_64
            os: ubuntu-24.04
            triplet: x64-linux
            cmake_preset: vcpkg-unix-release
          - target: macos-arm64
            os: macos-14
            triplet: arm64-osx
            cmake_preset: vcpkg-unix-release
          - target: windows-x86_64
            os: windows-2022
            triplet: x64-windows
            cmake_preset: vcpkg-windows-release

    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_COMMIT_ID: 120deac3062162151622ca4860575a33844ba10b

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run codebase enforcement checks
        run: python3 tools/checks/run_checks.py

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Validate pinned vcpkg baseline
        run: |
          $baseline = (Get-Content -Raw vcpkg.json | ConvertFrom-Json)."builtin-baseline"
          if ($baseline -ne $env:VCPKG_COMMIT_ID)
          {
            throw "vcpkg baseline mismatch. Expected '$($env:VCPKG_COMMIT_ID)', found '$baseline'."
          }

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT_ID }}-

      - name: Bootstrap pinned vcpkg
        run: |
          # Override system VCPKG_ROOT (Windows runners have it pre-set to VS installation)
          $env:VCPKG_ROOT = "${{ github.workspace }}/.vcpkg"
          
          git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          git -C $env:VCPKG_ROOT checkout $env:VCPKG_COMMIT_ID

          if ($IsWindows)
          {
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          }
          else
          {
            & "$env:VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          }

      - name: Install dependencies (manifest mode)
        run: |
          # Ensure VCPKG_ROOT is set correctly (override system variable on Windows)
          $env:VCPKG_ROOT = "${{ github.workspace }}/.vcpkg"
          
          $vcpkgExe = if ($IsWindows) { "$env:VCPKG_ROOT\vcpkg.exe" } else { "$env:VCPKG_ROOT/vcpkg" }
          & $vcpkgExe install --triplet "${{ matrix.triplet }}" --x-manifest-root "$env:GITHUB_WORKSPACE" --x-install-root "$env:VCPKG_INSTALLED_DIR"

      - name: Configure
        run: |
          cmake --preset "${{ matrix.cmake_preset }}" `
            -B "build/ci-${{ matrix.target }}-${{ matrix.build_type }}" `
            -D CMAKE_BUILD_TYPE="${{ matrix.build_type }}" `
            -D VCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -D VCPKG_INSTALLED_DIR="$env:VCPKG_INSTALLED_DIR" `
            -D MCP_SDK_BUILD_TESTS=ON `
            -D MCP_SDK_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build "build/ci-${{ matrix.target }}-${{ matrix.build_type }}" --parallel

      - name: Generate test TLS certificates
        run: bash tests/fixtures/generate_test_certs.sh

      - name: Test (ctest)
        run: ctest --test-dir "build/ci-${{ matrix.target }}-${{ matrix.build_type }}" --output-on-failure

  feature-matrix-test:
    name: Feature Matrix / ${{ matrix.variant }} / Linux Release
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        variant: [auth-off]
        include:
          - variant: auth-off
            cmake_flags: -DMCP_SDK_ENABLE_AUTH=OFF

    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_COMMIT_ID: 120deac3062162151622ca4860575a33844ba10b
      BUILD_DIR: build/ci-feature-matrix-${{ matrix.variant }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run codebase enforcement checks
        run: python3 tools/checks/run_checks.py

      - name: Validate pinned vcpkg baseline
        run: |
          baseline=$(jq -r '."builtin-baseline"' vcpkg.json)
          if [ "$baseline" != "$VCPKG_COMMIT_ID" ]; then
            echo "vcpkg baseline mismatch. Expected '$VCPKG_COMMIT_ID', found '$baseline'."
            exit 1
          fi

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-linux-x64-linux-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-linux-x64-linux-${{ env.VCPKG_COMMIT_ID }}-

      - name: Bootstrap pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT_ID"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install dependencies (manifest mode)
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet x64-linux --x-manifest-root "$GITHUB_WORKSPACE" --x-install-root "$VCPKG_INSTALLED_DIR"

      - name: Configure
        run: |
          cmake --preset vcpkg-unix-release \
            -B "$BUILD_DIR" \
            -D CMAKE_BUILD_TYPE=Release \
            -D VCPKG_TARGET_TRIPLET=x64-linux \
            -D VCPKG_INSTALLED_DIR="$VCPKG_INSTALLED_DIR" \
            -D MCP_SDK_BUILD_TESTS=ON \
            -D MCP_SDK_BUILD_EXAMPLES=OFF \
            ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Test - Auth Disabled Specific
        run: ctest --test-dir "$BUILD_DIR" -R mcp_sdk_auth_oauth_client_disabled_test --output-on-failure

      - name: Test - Remaining Compatible Tests
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure -E "authorization|mcp_sdk_auth_oauth_client_disabled_test"

  integration-reference-tests:
    name: Integration Reference Tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            triplet: x64-linux
          - os: macos-14
            triplet: arm64-osx

    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_COMMIT_ID: 120deac3062162151622ca4860575a33844ba10b

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run codebase enforcement checks
        run: python3 tools/checks/run_checks.py

      - name: Validate pinned vcpkg baseline
        run: |
          baseline=$(jq -r '."builtin-baseline"' vcpkg.json)
          if [ "$baseline" != "$VCPKG_COMMIT_ID" ]; then
            echo "vcpkg baseline mismatch. Expected '$VCPKG_COMMIT_ID', found '$baseline'."
            exit 1
          fi

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT_ID }}-

      - name: Bootstrap pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT_ID"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install dependencies (manifest mode)
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet "${{ matrix.triplet }}" --x-manifest-root "$GITHUB_WORKSPACE" --x-install-root "$VCPKG_INSTALLED_DIR"

      - name: Configure
        run: |
          cmake --preset vcpkg-unix-release \
            -B "build/ci-integration-ref-${{ matrix.os }}" \
            -D CMAKE_BUILD_TYPE=Release \
            -D VCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
            -D VCPKG_INSTALLED_DIR="$VCPKG_INSTALLED_DIR" \
            -D MCP_SDK_BUILD_TESTS=ON \
            -D MCP_SDK_INTEGRATION_TESTS=ON \
            -D MCP_SDK_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build "build/ci-integration-ref-${{ matrix.os }}" --parallel 4

      - name: Run Integration Tests
        run: ctest --test-dir "build/ci-integration-ref-${{ matrix.os }}" -R integration_reference --output-on-failure
